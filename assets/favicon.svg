<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>hecz.dev</title>
  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="14" fill="#0F0F1A"/>
  <!-- Subtle mauve inner glow -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="#8B7DA8" stroke-opacity="0.18" stroke-width="1"/>
  <!-- Lowercase "h" in Georgia italic bold, white -->
  <text x="18" y="48" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700" font-size="44" fill="#ffffff" letter-spacing="-1">h</text>
  <!-- Mauve accent dot (like the .dev in the brand lockup) -->
  <circle cx="46" cy="45" r="4" fill="#8B7DA8"/>
</svg>
